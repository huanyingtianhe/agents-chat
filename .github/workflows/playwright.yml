name: Playwright E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  playwright:
    name: Run Playwright tests (${{ matrix.shard.index }}/${{ matrix.shard.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard:
          - index: 1
            total: 4
            parts: 1 5 9 13
          - index: 2
            total: 4
            parts: 2 6 10 14
          - index: 3
            total: 4
            parts: 3 7 11 15
          - index: 4
            total: 4
            parts: 4 8 12 16

    env:
      ADMIN_PASSWORD: admin123
      ADMIN_USERNAME: admin
      NEXTAUTH_SECRET: playwright-ci-secret
      NEXTAUTH_URL: https://localhost:3010
      PLAYWRIGHT_BASE_URL: https://localhost:3010

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        shell: bash
        run: |
          nohup npm run dev >playwright-server.log 2>playwright-server.err.log &
          echo "$!" > playwright-server.pid

      - name: Wait for app
        shell: bash
        run: |
          server_pid="$(cat playwright-server.pid)"
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --insecure "$PLAYWRIGHT_BASE_URL/login" >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo 'Next.js dev server exited before becoming ready.' >&2
              cat playwright-server.log playwright-server.err.log 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for $PLAYWRIGHT_BASE_URL/login" >&2
          cat playwright-server.log playwright-server.err.log 2>/dev/null || true
          exit 1

      - name: Run Playwright tests
        run: |
          for shard in ${{ matrix.shard.parts }}; do
            npx playwright test --config tests/playwright.config.ts --shard="$shard/16"
          done

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.shard.index }}
          path: |
            playwright-report/
            test-results/
            playwright-server.log
            playwright-server.err.log
          if-no-files-found: ignore
